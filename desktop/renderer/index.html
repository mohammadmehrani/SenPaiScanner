<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta http-equiv="Content-Security-Policy" content="default-src 'self' 'unsafe-inline' data: blob:;" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>SenPaiScanner — Hacker Terminal</title>
    <style>
      body { margin: 0; background: #05060a; color: #cfe8ff; font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace; }
      .wrap { padding: 20px; }
      .header { display: flex; gap: 16px; align-items: center; }
      .dot { width: 10px; height: 10px; border-radius: 50%; background: #22c55e; display: inline-block; }
      .term { margin-top: 16px; border: 1px solid rgba(120,180,255,0.25); border-radius: 10px; background: rgba(10,15,25,0.55); overflow: hidden; }
      .out { height: 560px; overflow: auto; padding: 12px 14px; white-space: pre-wrap; font-size: 13px; line-height: 1.45; }
      .bar { display: flex; gap: 8px; padding: 12px 14px; border-top: 1px solid rgba(120,180,255,0.18); }
      .prompt { color: #7dd3fc; }
      input { flex: 1; background: transparent; border: 0; outline: 0; color: #cfe8ff; font-family: inherit; font-size: 13px; }
      button { background: rgba(120,180,255,0.18); border: 1px solid rgba(120,180,255,0.35); color: #e0f2fe; padding: 8px 12px; border-radius: 8px; cursor: pointer; }
      button:hover { background: rgba(120,180,255,0.28); }
    </style>
  </head>
  <body>
    <div class="wrap">
      <div class="header">
        <span class="dot"></span>
        <h3 style="margin:0; font-weight:700;">SenPaiScanner — Local Hacker Terminal</h3>
      </div>
      <div class="term">
        <div id="out" class="out"></div>
        <div class="bar">
          <span class="prompt">$</span>
          <input id="cmd" value="help" />
          <button id="run">Run</button>
          <button id="cancel">Cancel</button>
        </div>
      </div>
    </div>
    <script type="module" src="renderer.js"></script>

  </body>
</html>
